<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#7c3aed" />

    <title>gifsmith — video to GIF in your browser</title>
    <meta
      name="description"
      content="Turn any video into a GIF, entirely in your browser. No uploads, no watermark, no account. Your clip never leaves your device."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="gifsmith — video to GIF in your browser" />
    <meta
      property="og:description"
      content="Turn any video into a GIF, entirely in your browser. No uploads, no watermark. Your clip never leaves your device."
    />
    <meta property="og:type" content="website" />

    <!-- Security: CSP restricts the runtime to self only. blob:/data: for media + workers. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self' https://cloudflareinsights.com; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'"
    />

    <link rel="stylesheet" href="/src/styles/main.css" />
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "ba2bab2193ba42c1bea3d6714fcd0e28"}'></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <a class="brand" href="/">
            <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
              <defs>
                <linearGradient id="gs-grad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#a855f7" />
                  <stop offset="100%" stop-color="#ec4899" />
                </linearGradient>
              </defs>
              <rect x="2" y="5" width="28" height="22" rx="5" fill="url(#gs-grad)" />
              <path d="M14 12.5 L21 16 L14 19.5 Z" fill="#ffffff" />
            </svg>
            <span class="brand-name">gif<span class="brand-name-accent">smith</span></span>
          </a>
          <div class="topbar-meta">
            <span class="trust-badge" data-modal="tmpl-security" title="How your privacy is protected">
              <span class="dot-mini good"></span> runs entirely in your browser
            </span>
          </div>
        </div>
        <nav class="topbar-nav">
          <button type="button" class="nav-link" data-modal="tmpl-how-it-works">how it works</button>
          <button type="button" class="nav-link" data-modal="tmpl-security">threat model</button>
          <button type="button" class="nav-link" data-modal="tmpl-about">about</button>
          <button
            type="button"
            class="nav-link drawer-toggle"
            id="drawer-toggle"
            aria-expanded="false"
          >
            event log
          </button>
        </nav>
      </header>

      <div class="main-grid">
        <main id="app">
          <!-- populated by src/main.ts -->
        </main>
        <aside id="event-drawer" class="hidden">
          <!-- populated by src/eventlog.ts -->
        </aside>
      </div>

      <footer class="statusbar">
        <div class="status-left">
          <span class="status-pill">
            <span class="dot-mini idle" id="sb-status-dot"></span>
            <span class="label" id="sb-status-label">ready</span>
          </span>
          <span id="sb-detail" class="status-detail"></span>
        </div>
        <div class="status-right">
          <span class="attribution"
            >Built by
            <a href="https://benrichardson.dev/" target="_blank" rel="noopener noreferrer"
              >benrichardson.dev</a
            >
            ·
            <a href="https://sites.benrichardson.dev" target="_blank" rel="noopener"
              >more tools &amp; sites</a
            ></span
          >
        </div>
      </footer>
    </div>

    <!-- ───────────────── modals ───────────────── -->
    <template id="tmpl-how-it-works">
      <div class="modal-content">
        <h2 class="modal-title">how it works</h2>
        <ol class="steps">
          <li>
            <span class="step-num">01</span>
            <div>
              <h3>load a video</h3>
              <p>
                Drop in any video your browser can play (MP4, WebM, MOV…). It's opened with a
                plain <code>&lt;video&gt;</code> element — no upload, no server round-trip.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">02</span>
            <div>
              <h3>sample frames</h3>
              <p>
                gifsmith seeks the video to evenly-spaced timestamps for your chosen
                <span class="glossary-link" data-term="fps">frame rate</span>, draws each frame
                onto a canvas at your chosen
                <span class="glossary-link" data-term="scale">width</span>, and reads back the
                raw pixels.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">03</span>
            <div>
              <h3>quantize &amp; encode</h3>
              <p>
                A Web Worker reduces each frame to a 256-colour
                <span class="glossary-link" data-term="palette">palette</span> (GIF's limit) by
                <span class="glossary-link" data-term="quantize">quantizing</span> the pixels,
                then writes the animated GIF89a byte stream — all off the main thread so the page
                stays smooth.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">04</span>
            <div>
              <h3>save it</h3>
              <p>
                Preview the
                <span class="glossary-link" data-term="loop">looping</span> result, then
                download, copy it to your clipboard, or share it. The bytes only ever existed in
                this tab.
              </p>
            </div>
          </li>
        </ol>
      </div>
    </template>

    <template id="tmpl-security">
      <div class="modal-content">
        <h2 class="modal-title">threat model</h2>
        <div class="security-grid">
          <div class="security-card good">
            <h3>what's protected</h3>
            <ul>
              <li>Your source video — decoded, resized and read entirely inside this tab.</li>
              <li>Every sampled frame — pixels never leave the browser.</li>
              <li>The finished GIF — built in memory; saved only when you click download.</li>
            </ul>
          </div>
          <div class="security-card bad">
            <h3>what isn't</h3>
            <ul>
              <li>The initial page load — GitHub Pages / its CDN logs the request for the site.</li>
              <li>
                Whatever you do with the GIF after saving it — if you upload it somewhere, that's
                on you.
              </li>
              <li>Nothing about the video content, because it is never transmitted anywhere.</li>
            </ul>
          </div>
          <div class="security-card">
            <h3>trust surface</h3>
            <ul>
              <li>The static site bundle, hash-pinned by the GitHub Pages deploy.</li>
              <li>The TLS chain between you and GitHub Pages.</li>
              <li>No third-party fonts or trackers. The only third-party script is the cookie-less Cloudflare Web Analytics beacon — anonymous page-view counts; no personal data, no cross-site tracking.</li>
            </ul>
          </div>
        </div>
        <p class="modal-foot">
          Want to be sure? Load the page, then turn off your network — gifsmith keeps working,
          because your video is never sent anywhere. The only outbound request is the
          cookie-less Cloudflare Web Analytics page-view beacon.
        </p>
      </div>
    </template>

    <template id="tmpl-about">
      <div class="modal-content">
        <h2 class="modal-title">about gifsmith</h2>
        <p>
          gifsmith converts video to animated GIF without uploading anything. Frame sampling
          runs on a <code>&lt;video&gt;</code> element and a canvas; palette quantization and
          GIF encoding run in a Web Worker via
          <a href="https://github.com/mattdesl/gifenc" target="_blank" rel="noopener noreferrer"
            >gifenc</a
          >. No backend, no accounts, no watermark.
        </p>
        <p>
          Built by
          <a href="https://benrichardson.dev/" target="_blank" rel="noopener noreferrer"
            >benrichardson.dev</a
          >. Source on
          <a
            href="https://github.com/ben-gy/gifsmith"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >.
        </p>
        <p class="modal-foot">
          It's one of a small family of privacy-first, zero-backend browser tools — each does its
          whole job on your device.
        </p>
      </div>
    </template>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
